# fubo-flags control-plane configuration.
# Secrets (db password) come from env vars, never hardcoded here.
# Any value below can be overridden by the matching FUBO_FLAGS_* env var.

server:
  host: 0.0.0.0
  port: 8080

database:
  # Full URL may be supplied via DATABASE_URL (takes precedence over the parts).
  host: localhost
  port: 5432
  name: fubo_flags
  user: fubo_flags
  # password: supplied via DATABASE_PASSWORD env var
  pool_size: 5

logging:
  level: DEBUG          # DEBUG during early development per project conventions
  format: "%(asctime)s %(levelname)s %(name)s %(message)s"

# Change-notification bus. Phase 1 logs intent only; data plane wires this up.
notify:
  backend: log          # log | postgres | redis
