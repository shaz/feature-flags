# Local Postgres for control-plane development.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fubo_flags
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: fubo_flags
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fubo_flags"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  pgdata:
