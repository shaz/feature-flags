<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fubo-flags</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">F</span>
      <span class="brand-name">fubo-flags</span>
    </div>
    <div class="selectors">
      <label>Project
        <select id="project-select"></select>
      </label>
      <label>Env
        <select id="env-select"></select>
      </label>
      <button id="new-project-btn" class="ghost">+ Project</button>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-tab="flags" class="active">Feature flags</button>
    <button data-tab="segments">Segments</button>
    <button data-tab="keys">SDK keys</button>
    <button data-tab="audit">Audit log</button>
  </nav>

  <main id="view"></main>
  <div id="drawer" class="drawer hidden"></div>
  <div id="toast" class="toast hidden"></div>
</body>
<script src="app.js"></script>
</html>
