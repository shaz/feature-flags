name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  control-plane:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fubo_flags
          POSTGRES_PASSWORD: localdev
          POSTGRES_DB: fubo_flags
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U fubo_flags"
          --health-interval 2s --health-timeout 3s --health-retries 15
    env:
      DATABASE_URL: postgresql+psycopg://fubo_flags:localdev@localhost:5432/fubo_flags
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q

  sdk-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - run: go vet ./...
      - run: go test ./...

  data-plane:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fubo_flags
          POSTGRES_PASSWORD: localdev
          POSTGRES_DB: fubo_flags
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U fubo_flags"
          --health-interval 2s --health-timeout 3s --health-retries 15
    env:
      DATABASE_URL: postgres://fubo_flags:localdev@localhost:5432/fubo_flags
    defaults:
      run:
        working-directory: data-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - run: go vet ./...
      - run: go test ./...
