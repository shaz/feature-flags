document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e-darkest:  rgb(102, 22, 0);   /* inferred */\n  --color-orange-dark:     rgb(190, 41, 0);   /* inferred */\n  --color-orange-medium:   rgb(224, 49, 0);   /* Fubo red brand */\n  --color-orange-light:    rgb(255, 58, 3);   /* verified — light red */\n  --color-orange-lightest: rgb(255, 245, 242);/* verified — tint surface */\n\n  /* red 5-step (used for destructive/error) */\n  --color-red-darkest:  rgb(77, 10, 0);     /* inferred */\n  --color-red-dark:     rgb(170, 30, 0);    /* inferred */\n  --color-red-medium:   rgb(220, 50, 40);   /* inferred */\n  --color-red-light:    rgb(255, 115, 73);  /* verified */\n  --color-red-lightest: rgb(255, 226, 217); /* verified */\n\n  /* green 3-step (success) */\n  --color-green-darkest:  rgb(20, 75, 40);    /* inferred */\n  --color-green-medium:   rgb(66, 202, 128);  /* verified — debug marker */\n  --color-green-lightest: rgb(220, 245, 230); /* inferred */\n\n  /* yellow 3-step (warning) */\n  --color-yellow-darkest:  rgb(122, 85, 0);    /* inferred */\n  --color-yellow-medium:   rgb(255, 193, 7);   /* inferred */\n  --color-yellow-lightest: rgb(255, 245, 214); /* inferred */\n\n  /* blue 5-step (info) */\n  --color-blue-darkest:  rgb(14, 50, 115);   /* inferred */\n  --color-blue-dark:     rgb(40, 100, 200);  /* inferred */\n  --color-blue-medium:   rgb(98, 170, 255);  /* inferred — favorited star */\n  --color-blue-light:    rgb(170, 210, 255); /* inferred */\n  --color-blue-lightest: rgb(224, 238, 255); /* inferred */\n\n  /* white/black alpha ramps (verified keys, values are standard α steps) */\n  --color-white-o05: rgba(255, 255, 255, 0.05);\n  --color-white-o10: rgba(255, 255, 255, 0.10);\n  --color-white-o15: rgba(255, 255, 255, 0.15);\n  --color-white-o30: rgba(255, 255, 255, 0.30);\n  --color-white-o40: rgba(255, 255, 255, 0.40);\n  --color-black-o05: rgba(0, 0, 0, 0.05);\n  --color-black-o10: rgba(0, 0, 0, 0.10);\n  --color-black-o15: rgba(0, 0, 0, 0.15);\n  --color-black-o30: rgba(0, 0, 0, 0.30);\n  --color-black-o40: rgba(0, 0, 0, 0.40);\n  --color-black-o60: rgba(0, 0, 0, 0.60);\n  --color-black-o85: rgba(0, 0, 0, 0.85);\n  --color-black-o90: rgba(0, 0, 0, 0.90);\n  --color-black-o95: rgba(0, 0, 0, 0.95);\n  --color-black-o98: rgba(0, 0, 0, 0.98);\n\n  /* ─── semantic / text ──────────────────────────────────────── */\n  --text-normal:            var(--color-neutral-darkest);   /* verified 6,7,10 */\n  --text-subtle:            var(--color-neutral-lightest);  /* verified 250,251,255 */\n  --text-subtlest:          var(--color-neutral-lighter);   /* verified 200,204,223 */\n  --text-disabled:          var(--color-white);             /* verified */\n  --text-inverse:           var(--color-neutral-lightest);  /* verified */\n  --text-inverse-subtle:    var(--color-neutral-darkest);   /* verified */\n  --text-inverse-subtlest:  var(--color-neutral-darkest);   /* verified */\n  --text-inverse-disabled:  var(--color-neutral-medium-light); /* verified 65,68,85 */\n  --text-on-brand-bg:       var(--color-neutral-darkest);   /* verified */\n  --text-placeholder:       var(--color-neutral-lightest);  /* verified */\n\n  /* ─── semantic / icon (same surface roles) ─────────────────── */\n  --icon-normal:            var(--color-neutral-darkest);\n  --icon-subtle:            var(--color-neutral-darkest);\n  --icon-subtlest:          var(--color-neutral-lighter);   /* verified */\n  --icon-disabled:          rgb(162, 167, 192);             /* verified */\n  --icon-inverse:           var(--color-neutral-lightest);\n  --icon-inverse-subtle:    var(--color-neutral-darkest);\n  --icon-inverse-subtlest:  var(--color-neutral-darkest);\n  --icon-inverse-disabled:  var(--color-neutral-medium-light);\n  --icon-on-brand-bg:       var(--color-neutral-lightest);\n\n  /* ─── semantic / status ───────────────────────────────────── */\n  --semantic-success-normal:  var(--color-green-medium);\n  --semantic-success-dark:    var(--color-green-darkest);\n  --semantic-success-light:   var(--color-green-lightest);\n  --semantic-error-normal:    var(--color-red-medium);\n  --semantic-error-dark:      var(--color-red-dark);\n  --semantic-error-light:     var(--color-red-lightest);\n  --semantic-record:          var(--color-orange-medium);    /* inferred — DVR dot */\n  --semantic-live:            var(--color-orange-medium);    /* LIVE badge */\n  --semantic-brand-normal:    var(--color-orange-medium);\n  --semantic-brand-dark:      var(--color-orange-dark);\n\n  /* ─── semantic / backgrounds ──────────────────────────────── */\n  --bg-focused:                    var(--color-neutral-lightest);\n  --bg-view-backdrop-solid:        var(--color-neutral-dark);\n  --bg-view-backdrop-live-scrim:   rgba(6, 7, 10, 0.8);    /* inferred */\n  --bg-scrim-overlay-darker:       var(--color-black-o85);\n  --bg-scrim-overlay-medium:       var(--color-black-o60);\n  --bg-scrim-overlay-lighter:      var(--color-black-o30);\n\n  /* ─── Spacing (verified ladder) ───────────────────────────── */\n  --space-xxxxs: 4px;    /* space-xxxxs / \"space-4\" */\n  --space-xxxs:  8px;\n  --space-xxs:   12px;\n  --space-xs:    16px;\n  --space-sm:    24px;\n  --space-md:    32px;\n  --space-lg:    40px;\n  --space-xl:    48px;\n  --space-xxl:   64px;\n  --space-xxxl:  72px;\n  --space-xxxxl: 96px;\n\n  /* ─── Sizing (same 4→96 ladder) ──────────────────────────── */\n  --size-4: 4px;  --size-8: 8px;   --size-12: 12px;  --size-16: 16px;\n  --size-24: 24px; --size-32: 32px; --size-40: 40px; --size-48: 48px;\n  --size-64: 64px; --size-72: 72px; --size-96: 96px;\n\n  /* ─── Border radius (verified: 2, 4, 8, 12, 16, 24, 32, 48) ── */\n  --radius-xxs:  2px;\n  --radius-xs:   4px;\n  --radius-sm:   8px;\n  --radius-md:   12px;\n  --radius-lg:   16px;\n  --radius-xl:   24px;\n  --radius-xxl:  32px;\n  --radius-xxxl: 48px;\n  --radius-pill: 500px;\n\n  /* ─── Border width ─────────────────────────────────────────── */\n  --border-width-xs: 1px;\n  --border-width-sm: 1.5px;\n  --border-width-md: 2px;\n  --border-width-lg: 3px;\n\n  /* ─── Opacity (verified labels; standard % values) ─────────── */\n  --opacity-transparent:   0;\n  --opacity-x-subtle:      0.10;\n  --opacity-subtle:        0.25;\n  --opacity-light:         0.33;\n  --opacity-medium-light:  0.50;\n  --opacity-medium:        0.66;\n  --opacity-medium-strong: 0.80;\n  --opacity-strong:        0.90;\n  --opacity-x-strong:      0.95;\n  --opacity-opaque:        1.00;\n\n  /* ─── Mobile Typography — verified from Mobile-Phone type ramp ─\n     Token naming mirrors design: mbl.typography.{role}.{size}[-bold]\n     All sizes use 125% line-height unless noted.\n     Family: FT Regola Neue (fallback: \"Inter Tight\", system-ui).\n     ─────────────────────────────────────────────────────────────── */\n\n  /* Family + weight aliases */\n  --mbl-font-family:     \"FT Regola Neue\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", system-ui, sans-serif;\n  --mbl-font-display:    \"Barlow Condensed\", \"FT Regola Neue\", -apple-system, system-ui, sans-serif;\n  --mbl-weight-regular:  400;\n  --mbl-weight-semibold: 600;\n  --mbl-weight-bold:     700;\n\n  /* Heading — FT Regola Neue Semibold 600 · line-height 125% */\n  --mbl-heading-xxl-size: 32px;  --mbl-heading-xxl-lh: 1.25;\n  --mbl-heading-xl-size:  28px;  --mbl-heading-xl-lh:  1.25;\n  --mbl-heading-lg-size:  24px;  --mbl-heading-lg-lh:  1.25;\n  --mbl-heading-md-size:  20px;  --mbl-heading-md-lh:  1.25;\n  --mbl-heading-sm-size:  16px;  --mbl-heading-sm-lh:  1.25;\n  --mbl-heading-xs-size:  14px;  --mbl-heading-xs-lh:  1.25;\n\n  /* Paragraph / body — FT Regola Neue Regular 400 · line-height 125% */\n  --mbl-paragraph-md-size: 16px; --mbl-paragraph-md-lh: 1.25;\n  --mbl-paragraph-sm-size: 14px; --mbl-paragraph-sm-lh: 1.25;\n  --mbl-paragraph-xs-size: 12px; --mbl-paragraph-xs-lh: 1.25;\n\n  /* Paragraph — Mobile Web fallback (Helvetica 400, 24px LH) */\n  --mbl-paragraph-web-size: 16px; --mbl-paragraph-web-lh: 24px;\n\n  /* Interactive — FT Regola Neue Semibold 600 · line-height 125% */\n  --mbl-interactive-md-size: 16px; --mbl-interactive-md-lh: 1.25;\n  --mbl-interactive-sm-size: 14px; --mbl-interactive-sm-lh: 1.25;\n\n  /* Label / Caption — two weights per size:\n     -bold = Semibold 600, base = Regular 400 · line-height 125% */\n  --mbl-label-md-size: 14px; --mbl-label-md-lh: 1.25;\n  --mbl-label-sm-size: 12px; --mbl-label-sm-lh: 1.25;\n  --mbl-label-xs-size: 10px; --mbl-label-xs-lh: 1.25;\n\n  /* ─── Line-count (verified labels) ─────────────────────────── */\n  --line-count-zero:  0;\n  --line-count-2:     2;\n  --line-count-3:     3;\n  --line-count-4:     4;\n  --line-count-5:     5;\n  --line-count-6:     6;\n  --line-count-7:     7;\n  --line-count-8:     8;\n  --line-count-12:    12;\n}\n<\u002Fstyle>\n<style>\n@font-face{font-family:\"FT Regola Neue\";src:url(\"c6a9c4de-21f3-4acb-883d-231a02a3c8bf\") format(\"opentype\");font-weight:400;font-display:swap}\n@font-face{font-family:\"FT Regola Neue\";src:url(\"d5992b34-3a74-4575-9313-7c2fa6693748\") format(\"opentype\");font-weight:500;font-display:swap}\n@font-face{font-family:\"FT Regola Neue\";src:url(\"969b607f-27ca-4730-a9a5-a839fa0f7ae5\") format(\"opentype\");font-weight:600;font-display:swap}\n@font-face{font-family:\"FT Regola Neue\";src:url(\"fcc06db8-1d70-4a8a-831b-3ea8ab84905e\") format(\"opentype\");font-weight:700;font-display:swap}\n@font-face{font-family:\"Barlow Condensed\";src:url(\"63eef5ac-e46a-4358-95ba-50422ac6bd2c\") format(\"truetype\");font-weight:600;font-display:swap}\n@font-face{font-family:\"Barlow Condensed\";src:url(\"6d6b2cee-2292-40ff-bd56-0a431850422e\") format(\"truetype\");font-weight:700;font-display:swap}\n*{box-sizing:border-box}\nhtml,body{margin:0;padding:0;background:#0E0F17}\n::-webkit-scrollbar{width:10px;height:10px}\n::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:8px;border:2px solid transparent;background-clip:content-box}\n::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18);backg px;background:#161822;border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:0 12px 0 36px;color:#FAFBFF;font:400 13.5px 'FT Regola Neue';outline:none\">\n            <\u002Fdiv>\n            <sc-for list=\"{{ filters }}\" as=\"c\" hint-placeholder-count=\"5\">\n              <button onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.label }}<sc-if value=\"{{ c.count }}\" hint-placeholder-val=\"\"><span style=\"opacity:.6;margin-left:6px\">{{ c.count }}<\u002Fspan><\u002Fsc-if><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- table -->\n          <div style=\"background:#13141D;border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden\">\n            <div style=\"display:grid;grid-template-columns:minmax(220px,1.4fr) 102px 80px 112px 62px;gap:10px;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.06);font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#7F859F\">\n              <span>Flag<\u002Fspan>\n              <span>Status · {{ envName }}<\u002Fspan>\n              <span>Type<\u002Fspan>\n              <span>Evaluations (24h)<\u002Fspan>\n              <span style=\"text-align:right\">Updated<\u002Fspan>\n            <\u002Fdiv>\n            <sc-for list=\"{{ flags }}\" as=\"f\" hint-placeholder-count=\"10\">\n              <div onclick=\"{{ f.onOpen }}\" style=\"display:grid;grid-template-columns:minmax(220px,1.4fr) 102px 80px 112px 62px;gap:10px;padding:{{ rowPad }};border-bottom:1px solid rgba(255,255,255,.045);cursor:pointer;align-items:center;animation:flagPop .25s ease both\" style-hover=\"background:rgba(255,255,255,.025)\">\n                <div style=\"display:flex;align-items:center;gap:13px;min-width:0\">\n                  <button onclick=\"{{ f.onToggle }}\" style=\"{{ f.trackStyle }}\"><span style=\"{{ f.knobStyle }}\"><\u002Fspan><\u002Fbutton>\n                  <div style=\"min-width:0;flex:1\">\n                    <div style=\"display:flex;align-items:center;gap:7px;min-width:0\">\n                      <span style=\"font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:70px;flex:1 1 auto\">{{ f.name }}<\u002Fspan>\n                      <sc-for list=\"{{ f.tags }}\" as=\"t\" hint-placeholder-count=\"0\">\n                        <span style=\"font-size:10px;font-weight:600;color:#A2A7C0;background:rgba(255,255,255,.06);padding:1.5px 6px;border-radius:5px;white-space:nowrap;flex:none\">{{ t }}<\u002Fspan>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <code style=\"display:block;font-size:11.5px;color:#62AAFF;font-family:'Barlow Condensed',monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ f.key }}<\u002Fcode>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div><span style=\"{{ f.statusStyle }}\">{{ f.statusLabel }}<\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#C8CCDF\">{{ f.typeLabel }}<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:9px\">\n                  <sc-if value=\"{{ showSparklines }}\" hint-placeholder-val=\"{{ true }}\">\n                    <svg width=\"56\" height=\"22\" viewBox=\"0 0 56 22\" preserveAspectRatio=\"none\" style=\"flex:none\"><polyline points=\"{{ f.spark }}\" fill=\"none\" stroke=\"{{ f.sparkColor }}\" stroke-width=\"1.6\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg>\n                  <\u002Fsc-if>\n                  <span style=\"font-size:13px;font-weight:600;font-family:'Barlow Condensed',sans-serif;letter-spacing:.02em;color:#C8CCDF\">{{ f.evals }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"text-align:right;font-size:12px;color:#7F859F\">{{ f.modified }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"\">\n              <div style=\"padding:48px;text-align:center;color:#7F859F;font-size:14px\">No flags match \"{{ query }}\"<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ═══ FLAG DETAIL ═══ -->\n      <sc-if value=\"{{ isDetail }}\" hint-placeholder-val=\"\">\n        <div style=\"padding:20px 24px 60px;max-width:1100px\">\n          <button onclick=\"{{ backToFlags }}\" style=\"display:inline-flex;align-items:center;gap:7px;background:transparent;border:0;color:#7F859F;font:500 13px 'FT Regola Neue';cursor:pointer;margin-bottom:14px;padding:0\" style-hover=\"color:#FAFBFF\">\n            <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg>\n            All flags\n          <\u002Fbutton>\n\n          <div style=\"display:flex;align-items:flex-start;gap:16px;margin-bottom:22px\">\n            <div style=\"flex:1;min-width:0\">\n              <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:6px\">\n                <h2 style=\"font-size:24px;font-weight:700;margin:0;letter-spacing:-.02em\">{{ flag.name }}<\u002Fh2>\n                <sc-for list=\"{{ flag.tags }}\" as=\"t\" hint-placeholder-count=\"0\">\n                  <span style=\"font-size:11px;font-weight:600;color:#A2A7C0;background:rgba(255,255,255,.06);padding:2px 8px;border-radius:6px\">{{ t }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:10px\">\n                <code style=\"font-size:13px;color:#62AAFF;font-family:'Barlow Condensed',monospace;letter-spacing:.02em\">{{ flag.key }}<\u002Fcode>\n                <span style=\"color:#3A3D4D\">·<\u002Fspan>\n                <span style=\"font-size:12.5px;color:#7F859F\">{{ flag.typeLabel }}<\u002Fspan>\n                <span style=\"color:#3A3D4D\">·<\u002Fspan>\n                <span style=\"font-size:12.5px;color:#7F859F\">Owned by {{ flag.owner }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"margin:0;max-width:300px;font-size:13px;line-height:1.45;color:#A2A7C0;text-align:right\">{{ flag.desc }}<\u002Fp>\n          <\u002Fdiv>\n\n          <!-- env banner -->\n          <div style=\"display:flex;align-items:center;gap:16px;background:#13141D;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px 20px;margin-bottom:18px\">\n            <button onclick=\"{{ flag.onToggle }}\" style=\"{{ flag.bigTrackStyle }}\"><span style=\"{{ flag.bigKnobStyle }}\"><\u002Fspan><\u002Fbutton>\n            <div style=\"flex:1\">\n              <div style=\"font-size:15px;font-weight:600\">Targeting is {{ flag.onWord }} in <span style=\"color:{{ envColor }}\">{{ envName }}<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#7F859F;margin-top:2px\">{{ flag.envSub }}<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"font-size:11px;color:#7F859F\">Last changed {{ flag.modified }} by {{ flag.owner }}<\u002Fspan>\n          <\u002Fdiv>\n\n          <!-- tabs -->\n          <div style=\"display:flex;gap:2px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:22px\">\n            <sc-for list=\"{{ detailTabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- TARGETING TAB -->\n          <sc-if value=\"{{ tabTargeting }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:grid;grid-template-columns:1fr 280px;gap:22px;align-items:start\">\n              <div>\n                <!-- rules -->\n                <div style=\"font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#7F859F;margin-bottom:12px\">Targeting rules<\u002Fdiv>\n                <sc-for list=\"{{ flag.r kground:{{ r.varColor }}\"><\u002Fspan>{{ r.serve }}\n                      <\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n\n                <!-- percentage rollout -->\n                <div style=\"background:#13141D;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px 18px;margin-bottom:12px\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\">\n                    <span style=\"font-size:13.5px;font-weight:600\">Default rule · percentage rollout<\u002Fspan>\n                    <span style=\"font-size:12px;color:#7F859F\">everyone else<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;height:34px;border-radius:9px;overflow:hidden;border:1px solid rgba(255,255,255,.08)\">\n                    <sc-for list=\"{{ flag.rollout }}\" as=\"seg\" hint-placeholder-count=\"2\">\n                      <div style=\"{{ seg.barStyle }}\"><span style=\"font-size:11.5px;font-weight:700;color:#06070A;white-space:nowrap\">{{ seg.pct }}<\u002Fspan><\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;gap:16px;margin-top:12px\">\n                    <sc-for list=\"{{ flag.rollout }}\" as=\"seg\" hint-placeholder-count=\"2\">\n                      <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:#C8CCDF\"><span style=\"width:9px;height:9px;border-radius:3px;background:{{ seg.color }}\"><\u002Fspan>{{ seg.name }} · {{ seg.pct }}<\u002Fspan>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <button style=\"display:inline-flex;align-items:center;gap:7px;background:transparent;border:1px dashed rgba(255,255,255,.18);color:#A2A7C0;border-radius:9px;padding:9px 14px;font:600 13px 'FT Regola Neue';cursor:pointer\" style-hover=\"border-color:rgba(255,255,255,.35);color:#FAFBFF\">\n                  <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n                  Add rule\n                <\u002Fbutton>\n              <\u002Fdiv>\n\n              <!-- variations rail -->\n              <div>\n                <div style=\"font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#7F859F;margin-bottom:12px\">Variations<\u002Fdiv>\n                <div style=\"background:#13141D;border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden\">\n                  <sc-for list=\"{{ flag.variations }}\" as=\"v\" hint-placeholder-count=\"2\">\n                    <div style=\"display:flex;align-items:center;gap:11px;padding:13px 15px;border-bottom:1px solid rgba(255,255,255,.05)\">\n                      <span style=\"width:11px;height:11px;border-radius:4px;background:{{ v.color }};flex:none\"><\u002Fspan>\n                      <div style=\"flex:1;min-width:0\">\n                        <div style=\"font-size:13px;font-weight:600\">{{ v.name }}<\u002Fdiv>\n                        <div style=\"font-size:11.5px;color:#7F859F\">{{ v.val }}<\u002Fdiv>\n                      <\u002Fdiv>\n                      <sc-if value=\"{{ v.isDefault }}\" hint-placeholder-val=\"\"><span style=\"font-size:10px;font-weight:700;color:#42CA80;text-transform:uppercase;letter-spacing:.05em\">Default<\u002Fspan><\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#7F859F;margin:20px 0 12px\">Prerequisites<\u002Fdiv>\n                <div style=\"background:#13141D;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px 15px;font-size:12.5px;color:#7F859F\">{{ flag.prereq }}<\u002Fdiv>\n screen:\"detail\", selectedId:f.id, detailTab:\"targeting\" })\n      };\n    });\n\n    const onCount = this.FLAGS.filter(f=>this.isOn(f,env)).length;\n    const rollCount = this.FLAGS.filter(f=>this.rawState(f,env)===\"roll\").length;\n    const filterDefs = [\n      { id:\"all\", label:\"All\", count:String(this.FLAGS.length) },\n      { id:\"on\", label:\"On\", count:String(onCount) },\n      { id:\"off\", label:\"Off\", count:String(this.FLAGS.length-onCount) },\n      { id:\"rollout\", label:\"Rollouts\", count:String(rollCount) },\n      { id:\"player\", label:\"player\", count:\"\" }\n    ];\n    const filters = filterDefs.map(c => ({\n      label:c.label, count:c.count,\n      onClick: () => this.setState({ filter:c.id }),\n      style:`height:38px;display:inline-flex;align-items:center;border:1px solid ${st.filter===c.id?'rgba(255,255,255,.22)':'rgba(255,255,255,.08)'};background:${st.filter===c.id?'rgba(255,255,255,.1)':'transparent'};color:${st.filter===c.id?'#FAFBFF':'#9298B0'};border-radius:9px;padding:0 13px;font:600 12.5px 'FT Regola Neue';cursor:pointer;white-space:nowrap`\n    }));\n\n    // ---- detail ----\n    const fd = this.FLAGS.find(f=>f.id===st.selectedId) || this.FLAGS[0];\n    const dOn = this.isOn(fd,env);\n    const dRaw = this.rawState(fd,env);\n    const defaultRollout = fd.rollout || [{name:\"On\",pct:100,color:\"#42CA80\"}];\n    const rollout = defaultRollout.map(r => ({\n      name:r.name, pct:r.pct+\"%\", color:r.color,\n      barStyle:`width:${r.pct}%;background:${r.color};display:flex;align-items:center;justify-content:center;border-right:2px solid #13141D`\n    }));\n    const variations = fd.type===\"multi\"\n      ? (fd.rollout||[]).map((r,i)=>({ name:r.name, val:`returns \"${r.name.toLowerCase().replace(/[^a-z0-9]/g,'_')}\"`, color:r.color, isDefault:i===0 }))\n      : [ {name:\"On\",val:\"returns true\",color:\"#42CA80\",isDefault:true}, {name:\"Off\",val:\"returns false\",color:\"#7F859F\",isDefault:false} ];\n    const rules = [\n      { conj:\"Rule 1\", attr:\"user.segment\", op:\"is one of\", value:\"beta-testers\", serve:variations[0].name, varColor:variations[0].color },\n      { conj:\"Rule 2\", attr:\"user.country\", op:\"is one of\", value:\"US, CA\", serve:variations[variations.length>1?1:0].name, varColor:variations[variations.length>1?1:0].color }\n    ];\n    const history = [\n      { who:fd.owner, what:`set targeting ${dOn?'on':'off'} in ${env}`, when:fd.mod, env, dot:dOn?'#42CA80':'#7F859F' },\n      { who:\"Priya N.\", what:\"added rule · user.segment is beta-testers\", when:\"1d ago\", env:\"staging\", dot:\"#62AAFF\" },\n      { who:\"Sam R.\", what:`created flag with ${variations.length} variations`, when:\"2w ago\", env:\"production\", dot:\"#A77BFF\" }\n    ];\n    const flag = {\n      name:fd.name, key:fd.key, tags:fd.tags, desc:fd.desc, owner:fd.owner, modified:fd.mod,\n      typeLabel:fd.type===\"multi\"?\"Multivariate\":\"Boolean flag\",\n      onWord: dOn ? \"ON\" : \"OFF\",\n      envSub: dRaw===\"roll\" ? \"Serving a percentage rollout to all users not matched by a rule.\" : dOn ? \"All users matched by the rules below; everyone else gets the default.\" : \"All users receive the off variation.\",\n      bigTrackStyle:this.trackStyle(dOn,true), bigKnobStyle:this.knobStyle(dOn,true),\n      onToggle:()=>this.toggle(fd.id),\n      rules, rollout, variations,\n      prereq: fd.id===\"multiview-4up\" ? \"Requires new-player-ui to be ON.\" : \"No prerequisites.\",\n      history\n    };\n\n    // ---- dashboard ----\n    const metrics = [\n      { label:\"Total flags\", value:String(this.FLAGS.length), sub:\"2 added this week\", color:\"#FAFBFF\" },\n      { label:`Enabled in ${envObj.label.toLowerCase()}`, value:String(onCount), sub:`${rollCount} on rollout`, color:\"#42CA80\" },\n      { label:\"Evaluations (24h)\", value:\"2.4M\", sub:\"+12% vs yesterday\", color:\"#62AAFF\" },\n      { label:\"Stale flags\", value:\"3\", sub:\"no change in 30d\", color:\"#FFC107\" }\n    ];\n    const chartVals = [62,74,58,81,69,92,88];\n    const days = [\"Mon\",\"Tue\",\"Wed\",\"Thu\",\"Fri\",\"Sat\",\"Sun\"];\n    const chart = chartVals.map((v,i)=>({ day:days[i], barStyle:`width:100%;height:${v}%;background:${i===5?'#E03100':'linear-gradient(180deg,#62AAFF,#3A6FB0)'};border-radius:6px 6px 2px 2px` }));\n    const activity = this.AUDIT.slice(0,6).map(a=>({ who:a.who, what:`${a.what} ${a.target}`, when:a.when, dot:a.what.includes(\"off\")||a.what.includes(\"archived\")?\"#7F859F\":a.what.includes(\"created\")?\"#A77BFF\":\"#42CA80\" }));\n\n    // ---- segments ----\n    const SEGD = {\n      \"beta-testers\":{d:\"M12 2l3 6 6 .9-4.5 4.3 1 6.3L12 17l-5.5 2.5 1-6.3L3 8.9 9 8z\",fill:\"#62AAFF\",stroke:\"none\",sw:0},\n      \"nfl-st-subs\":{d:\"M12 6c5 0 9 2.7 9 6s-4 6-9 6-9-2.7-9-6 4-6 9-6z\",fill:\"#FF6B3D\",stroke:\"none\",sw:0},\n      \"power-viewers\":{d:\"M13 2L3 14h7l-1 8 10-12h-7z\",fill:\"#42CA80\",stroke:\"none\",sw:0},\n      \"es-households\":{d:\"M12 3a9 9 0 100 18 9 9 0 000-18M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18\",fill:\"none\",stroke:\"#FFC107\",sw:2},\n      \"new-signups\":{d:\"M12 4a4 4 0 100 8 4 4 0 000-8M4 21c1-4 4-6 8-6s7 2 8 6\",fill:\"none\",stroke:\"#A77BFF\",sw:2},\n      \"internal-staff\":{d:\"M4 8h16v12H4zM9 8V5h6v3\",fill:\"none\",stroke:\"#C8CCDF\",sw:2}\n    };\n    const segments = this.SEGMENTS.map(s => { const d=SEGD[s.key]||SEGD[\"beta-testers\"]; return { ...s, iconD:d.d, iconFill:d.fill, iconStroke:d.stroke, iconSw:String(d.sw) }; });\n\n    // ---- experiments ----\n    const experiments = this.EXPERIMENTS.map(x => ({\n      name:x.name, key:x.key, metric:x.metric, sample:x.sample, meta:x.meta, sig:x.sig, status:x.status,\n      statusStyle: x.running ? this.pill(\"#42CA80\") : this.pillOff(),\n      sigStyle:`margin-left:auto;font-weight:600;color:${x.sigGood?'#42CA80':'#FFC107'}`,\n      variants:x.variants.map(v=>({ name:v.name, rate:v.rate, delta:v.delta, color:v.color, weight:String(v.weight), barStyle:`width:${v.pct}%;height:100%;background:${v.color};border-radius:7px;opacity:${v.control?.6:1}` }))\n    }));\n\n    // ---- audit ----\n    const audit = this.AUDIT.map(a => ({\n      who:a.who, what:a.what, target:a.target, env:a.env, when:a.when, initials:a.initials, avColor:a.avColor,\n      envStyle:`font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:500px;color:${a.env==='production'?'#42CA80':a.env==='staging'?'#FFC107':'#62AAFF'};background:rgba(255,255,255,.05);flex:none`\n    }));\n\n    const dt = (id,label)=>({ label, onClick:()=>this.setState({detailTab:id}), style:`background:transparent;border:0;border-bottom:2px solid ${st.detailTab===id?'#FAFBFF':'transparent'};color:${st.detailTab===id?'#FAFBFF':'#7F859F'};padding:10px 4px;margin-right:22px;font:600 13.5px 'FT Regola Neue';cursor:pointer` });\n\n    const dense = ((this.props && this.props.density) || \"Dense\") !== \"Comfortable\";\n    const showSparklines = !(this.props && this.props.showSparklines === false);\n\n    return {\n      projectName:\"Fubo Streaming\",\n      rowPad: dense ? \"11px 16px\" : \"17px 16px\",\n      showSparklines,\n      pageTitle:onDetail?fd.name:titles[st.screen],\n      nav, envs, envName:envObj.label, envColor:envObj.color,\n      toggleProject:()=>{},\n      isFlags: st.screen===\"flags\", isDetail:onDetail, isDash:st.screen===\"dashboard\",\n      isSeg:st.screen===\"segments\", isExp:st.screen===\"experiments\", isAudit:st.screen===\"audit\",\n      flagSummary:`${this.FLAGS.length} flags · ${onCount} on in ${envObj.label.toLowerCase()}`,\n      query:st.query, onSearch:(e)=>this.setState({query:e.target.value}),\n      flags, filters, noResults: flags.length===0,\n      flag, backToFlags:()=>this.setState({screen:\"flags\"}),\n      detailTabs:[ dt(\"targeting\",\"Targeting\"), dt(\"variations\",\"Variations\"), dt(\"experiment\",\"Experimentation\"), dt(\"history\",\"History\") ],\n      tabTargeting: st.detailTab===\"targeting\"||st.detailTab===\"variations\",\n      tabHistory: st.detailTab===\"history\",\n      tabExp: st.detailTab===\"experiment\",\n      metrics, chart, activity, segments, experiments, audit\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
